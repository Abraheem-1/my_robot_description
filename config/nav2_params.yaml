# ============================================================
#  Nav2 Parameters — my_robot  (FINAL TUNED VERSION)
#  Frames: map → odom → base_footprint → base_link → lidar_1
#  LiDAR topic: /scan
#  Localization: slam_toolbox
#  Controller: Regulated Pure Pursuit
# ============================================================


# ================= LIFECYCLE MANAGER =================
lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names:
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower


# ================= BT NAVIGATOR =================
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"


# ================= PLANNER SERVER =================
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true


# ================= CONTROLLER SERVER =================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    # ── Progress checker ─────────────────────────────────
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 30.0

    # ── Goal checker ─────────────────────────────────────
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.4
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ── Speed ────────────────────────────────────────────
      desired_linear_vel: 0.25
      max_linear_accel: 2.5
      max_linear_decel: 2.5

      # ── Lookahead ────────────────────────────────────────
      # Short lookahead = sharp turns, precise path tracking
      lookahead_dist: 0.25
      min_lookahead_dist: 0.1
      max_lookahead_dist: 0.4
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false

      # ── Rotation ─────────────────────────────────────────
      # Enabled with high threshold — only rotates in place
      # when significantly misaligned (near goal turns)
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785   # 45° threshold
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 1.5

      # ── Approach ─────────────────────────────────────────
      # Slows down well before goal to avoid overshooting
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 1.2

      # ── Collision detection ──────────────────────────────
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_goal: 1.0

      # ── Velocity scaling ─────────────────────────────────
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1

      # ── Other ────────────────────────────────────────────
      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 0.5
      allow_reversing: false
      max_robot_pose_search_dist: 10.0
      transform_tolerance: 0.5


# ================= BEHAVIOR SERVER =================
behavior_server:
  ros__parameters:
    use_sim_time: True
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2


# ================= WAYPOINT FOLLOWER =================
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


# ================= LOCAL COSTMAP =================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.15
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: True


# ================= GLOBAL COSTMAP =================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: True