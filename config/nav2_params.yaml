# ============================================================
#  Nav2 Parameters — my_robot  (FINAL TUNED VERSION)
#  Frames: map → odom → base_footprint → base_link → lidar_1
#  LiDAR topic: /scan
#  Localization: slam_toolbox
#  Controller: Regulated Pure Pursuit
# ============================================================


# ================= LIFECYCLE MANAGER =================
# The lifecycle manager is responsible for transitioning all Nav2
# nodes through their lifecycle states (unconfigured → inactive → active).
# Without this, every node stays unconfigured and does nothing.
lifecycle_manager:
  ros__parameters:
    use_sim_time: True          # use Gazebo simulation clock instead of wall clock
    autostart: True             # automatically activate all nodes on launch
    node_names:                 # list of nodes this manager controls — order matters
      - planner_server          # global path planner must start before controller
      - controller_server       # local path follower
      - behavior_server         # recovery behaviors (spin, backup, wait)
      - bt_navigator            # behavior tree orchestrator — starts last
      - waypoint_follower       # multi-waypoint following


# ================= BT NAVIGATOR =================
# The Behavior Tree Navigator orchestrates the entire navigation stack.
# It runs a behavior tree that calls the planner and controller in sequence,
# handles replanning, and triggers recovery behaviors when the robot gets stuck.
bt_navigator:
  ros__parameters:
    use_sim_time: True                  # must match all other nodes
    global_frame: map                   # the fixed global reference frame
    robot_base_frame: base_footprint    # robot's base frame for transforms
    odom_topic: /odom                   # odometry topic to monitor robot motion
    bt_loop_duration: 10                # milliseconds between behavior tree ticks
                                        # lower = more responsive but more CPU
    default_server_timeout: 20          # seconds to wait for action servers to respond
                                        # increase if nodes are slow to start
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"     # single goal navigation
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator" # waypoint navigation


# ================= PLANNER SERVER =================
# The planner server computes a global path from the robot's
# current position to the goal. It uses the global costmap
# to find a collision-free path around known obstacles.
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]      # list of planner plugins to load
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"  # NavFn: grid-based path planner
      tolerance: 0.5        # meters — how close to goal counts as "reached" for planning
                            # increase if planner fails to find path to exact goal cell
      use_astar: false      # false = Dijkstra (more optimal), true = A* (faster)
                            # use A* for large maps where speed matters more
      allow_unknown: true   # true = plan through unexplored (grey) areas
                            # false = only plan through known free space


# ================= CONTROLLER SERVER =================
# The controller server runs the local planner which generates
# velocity commands (cmd_vel) to follow the global path while
# avoiding dynamic obstacles detected by the local costmap.
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0          # Hz — how often to compute new cmd_vel
                                        # higher = smoother but more CPU
    controller_plugins: ["FollowPath"]  # list of controller plugins to load
    min_x_velocity_threshold: 0.001    # m/s — velocities below this are treated as zero
                                        # prevents noise from being treated as motion
    min_y_velocity_threshold: 0.5      # m/s — lateral velocity threshold (high for diff drive
                                        # since diff drive cannot strafe)
    min_theta_velocity_threshold: 0.001 # rad/s — rotation velocity threshold

    # ── Progress checker ─────────────────────────────────
    # Monitors whether the robot is actually making progress toward the goal.
    # If the robot doesn't move enough within the time allowance, navigation aborts.
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05   # meters — minimum distance robot must move
                                        # to be considered "making progress"
                                        # decrease if robot moves very slowly
      movement_time_allowance: 30.0    # seconds — time allowed to make that movement
                                        # increase for slow robots or complex environments

    # ── Goal checker ─────────────────────────────────────
    # Determines when the robot has successfully reached its goal.
    # The robot stops when both position and orientation tolerances are met.
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15          # meters — how close to goal position = success
                                        # decrease for more precise stopping
                                        # increase if robot oscillates near goal
      yaw_goal_tolerance: 0.4          # radians (~23°) — how close to goal heading = success
                                        # decrease for more precise final orientation
                                        # increase to stop spinning at goal
      stateful: true                   # true = once xy tolerance met, only check yaw
                                        # false = must meet both simultaneously always

    # ── Regulated Pure Pursuit Controller ────────────────
    # Follows the global path by computing the curvature needed
    # to reach a "lookahead point" on the path ahead of the robot.
    # Regulates speed based on path curvature and proximity to obstacles.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ── Speed ────────────────────────────────────────────
      desired_linear_vel: 0.25         # m/s — target forward speed during navigation
                                        # increase for faster navigation
                                        # decrease if robot overshoots or crashes
      max_linear_accel: 2.5            # m/s² — maximum forward acceleration
                                        # decrease for smoother speed ramp-up
      max_linear_decel: 2.5            # m/s² — maximum forward deceleration
                                        # decrease to avoid sudden braking

      # ── Lookahead ────────────────────────────────────────
      # The lookahead point is the target point on the path the robot steers toward.
      # Shorter lookahead = tighter turns but more oscillation
      # Longer lookahead = smoother motion but wider turns
      lookahead_dist: 0.25             # meters — default lookahead distance
                                        # decrease for sharper turns in tight spaces
                                        # increase for smoother motion in open spaces
      min_lookahead_dist: 0.1          # meters — minimum lookahead (used at low speeds)
      max_lookahead_dist: 0.4          # meters — maximum lookahead (used at high speeds)
      lookahead_time: 1.5              # seconds — alternative lookahead based on time
                                        # lookahead_dist = current_speed × lookahead_time
      use_velocity_scaled_lookahead_dist: false  # true = lookahead scales with speed
                                                  # false = use fixed lookahead_dist

      # ── Rotation ─────────────────────────────────────────
      # Controls whether the robot stops and rotates in place
      # before driving when it is significantly misaligned with the path.
      use_rotate_to_heading: true      # true = rotate in place when misaligned
                                        # false = always drive in arcs (smoother but less precise)
      rotate_to_heading_min_angle: 0.785  # radians (45°) — only rotate in place if
                                           # misalignment exceeds this angle
                                           # increase to rotate less often
                                           # decrease to rotate more precisely
      rotate_to_heading_angular_vel: 0.8  # rad/s — rotation speed when rotating in place
                                           # decrease if robot overshoots target heading
      max_angular_accel: 1.5           # rad/s² — maximum angular acceleration
                                        # decrease for smoother rotation ramp-up

      # ── Approach ─────────────────────────────────────────
      # Controls how the robot slows down as it approaches the goal.
      min_approach_linear_velocity: 0.03   # m/s — minimum speed when near goal
                                            # decrease to stop more precisely
                                            # increase if robot stalls near goal
      approach_velocity_scaling_dist: 1.2  # meters — distance from goal at which
                                            # robot starts slowing down
                                            # increase to start slowing down earlier
                                            # decrease if robot overshoots goal

      # ── Collision detection ──────────────────────────────
      # Checks if the robot's current trajectory will cause a collision.
      # If a collision is predicted, the robot slows down or stops.
      use_collision_detection: true    # true = check for collisions along trajectory
                                        # false = disable (not recommended)
      max_allowed_time_to_collision_up_to_goal: 1.0  # seconds — how far ahead to check
                                                       # increase for earlier braking
                                                       # decrease to allow closer approach

      # ── Velocity scaling ─────────────────────────────────
      # Automatically reduces speed on sharp curves to maintain stability.
      use_regulated_linear_velocity_scaling: true   # true = slow down on sharp curves
                                                     # false = constant speed always
      use_cost_regulated_linear_velocity_scaling: true  # true = slow down near obstacles
                                                          # false = ignore obstacle costs
      regulated_linear_scaling_min_radius: 0.9      # meters — curves tighter than this
                                                     # trigger speed reduction
                                                     # decrease to slow down on gentler curves
      regulated_linear_scaling_min_speed: 0.1       # m/s — minimum speed after scaling
                                                     # prevents robot from stopping on curves

      # ── Curvature ────────────────────────────────────────
      use_fixed_curvature_lookahead: true    # true = use separate lookahead for curvature
                                              # false = use same lookahead_dist for curvature
      curvature_lookahead_dist: 0.5          # meters — lookahead used for curvature calculation
                                              # increase for smoother curve detection

      # ── Other ────────────────────────────────────────────
      allow_reversing: false           # true = robot can drive backwards
                                        # false = forward only (recommended for diff drive)
      max_robot_pose_search_dist: 10.0 # meters — how far along path to search for
                                        # robot's closest point
                                        # increase for very long paths
      transform_tolerance: 0.5         # seconds — how old a transform can be before
                                        # it's considered invalid
                                        # increase if TF errors appear during navigation


# ================= BEHAVIOR SERVER =================
# Recovery behaviors are triggered when the robot gets stuck.
# The behavior tree tries each behavior in sequence until one succeeds.
behavior_server:
  ros__parameters:
    use_sim_time: True
    local_costmap_topic: local_costmap/costmap_raw      # costmap for collision checking
    global_costmap_topic: global_costmap/costmap_raw    # global costmap reference
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0           # Hz — how often behaviors are evaluated
    behavior_plugins: ["spin", "backup", "wait"]  # recovery behaviors to load
    spin:
      plugin: "nav2_behaviors/Spin"   # rotates robot in place to find clear path
    backup:
      plugin: "nav2_behaviors/BackUp" # drives robot backwards to escape tight spots
    wait:
      plugin: "nav2_behaviors/Wait"   # waits for dynamic obstacles to move
    simulate_ahead_time: 2.0          # seconds — how far ahead to simulate for safety checks
    max_rotational_vel: 1.0           # rad/s — maximum rotation speed during recovery spin
    min_rotational_vel: 0.4           # rad/s — minimum rotation speed during recovery spin
    rotational_acc_lim: 3.2           # rad/s² — rotational acceleration limit


# ================= WAYPOINT FOLLOWER =================
# Enables the robot to follow a sequence of waypoints one by one.
# Can pause at each waypoint before continuing to the next.
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20                    # Hz — how often waypoint follower checks progress
    stop_on_failure: false           # false = skip failed waypoints and continue
                                      # true = abort entire mission on first failure
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True                  # true = pause at each waypoint
      waypoint_pause_duration: 200   # milliseconds to wait at each waypoint
                                      # increase for longer pauses between waypoints


# ================= LOCAL COSTMAP =================
# A small rolling map centered on the robot used by the controller
# to detect and avoid nearby dynamic obstacles in real time.
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 5.0          # Hz — how often to update obstacle data
                                      # increase for faster obstacle response
      publish_frequency: 2.0         # Hz — how often to publish costmap for visualization
      global_frame: odom             # local costmap is relative to odom frame
                                      # (moves with robot, not fixed to map)
      robot_base_frame: base_footprint
      rolling_window: true           # true = costmap follows robot
                                      # false = fixed position (not suitable for local)
      width: 4                       # meters — width of local costmap window
                                      # increase for faster robots or wider environments
      height: 4                      # meters — height of local costmap window
      resolution: 0.05               # meters per cell — smaller = more detailed but slower
      robot_radius: 0.15             # meters — robot's circular footprint radius
                                      # increase to give more clearance from obstacles
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan    # which sensors to use for obstacle detection
        scan:
          topic: /scan               # LiDAR scan topic
          max_obstacle_height: 2.0   # meters — ignore obstacles taller than this
          clearing: True             # true = clear cells when sensor sees free space
          marking: True              # true = mark cells when sensor sees obstacles
          data_type: "LaserScan"     # sensor message type
          raytrace_max_range: 3.0    # meters — maximum range for clearing free space
          raytrace_min_range: 0.15   # meters — minimum range for clearing
                                      # must be >= LiDAR min range to avoid self-detection
          obstacle_max_range: 2.5    # meters — maximum range for marking obstacles
          obstacle_min_range: 0.15   # meters — minimum range for marking obstacles
                                      # must be >= LiDAR min range to avoid self-detection
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0     # how quickly cost drops off with distance from obstacle
                                      # higher = steeper dropoff = robot stays closer to obstacles
                                      # lower = gentler dropoff = robot keeps more distance
        inflation_radius: 0.45       # meters — how far to inflate obstacles
                                      # increase to keep robot further from walls
                                      # decrease if robot can't fit through narrow gaps
      always_send_full_costmap: True  # true = always publish full costmap
                                       # false = only publish changes (saves bandwidth)


# ================= GLOBAL COSTMAP =================
# A full-map static costmap used by the planner to compute
# collision-free global paths. Updated less frequently than local costmap.
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0          # Hz — how often to update (lower than local is fine)
      publish_frequency: 1.0         # Hz — how often to publish for visualization
      global_frame: map              # global costmap is fixed to map frame
      robot_base_frame: base_footprint
      robot_radius: 0.15             # meters — robot footprint for collision checking
      resolution: 0.05               # meters per cell — match your map resolution
      track_unknown_space: true      # true = treat unexplored areas as potentially free
                                      # false = treat unexplored as occupied (safer)
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True  # true = receive map even if subscribed late
                                              # required to get map from slam_toolbox
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.15   # must match LiDAR min range
          obstacle_max_range: 2.5
          obstacle_min_range: 0.15   # must match LiDAR min range
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0     # same as local costmap for consistent behavior
        inflation_radius: 0.45       # same as local costmap
      always_send_full_costmap: True