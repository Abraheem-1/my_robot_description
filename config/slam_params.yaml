# ============================================================
#  SLAM Toolbox Parameters — my_robot
#  
#  Two modes:
#  - mapping:      building a new map (use_slam:=true)
#  - localization: navigating on saved map (use_slam:=false)
#
#  The mode is overridden by the launch file automatically.
# ============================================================

slam_toolbox:
  ros__parameters:

    # ================= SIMULATION =================
    use_sim_time: true

    # ================= FRAMES =================
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan

    # ================= MODE =================
    # 'mapping'      → build new map
    # 'localization' → localize on saved map
    mode: mapping

    # ================= LOCALIZATION MAP =================
    # Only used when mode: localization
    # Points to the saved map (without file extension)
    map_file_name: /home/abraheem/ros2_ws/src/my_robot_description/maps/my_map
    map_start_at_dock: true    # start localization at map origin (robot spawn point)

    # ================= SOLVER =================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ================= MAP SETTINGS =================
    resolution: 0.05
    max_laser_range: 10.0
    minimum_travel_distance: 0.1    # ← was 0.3, update more frequently
    minimum_travel_heading: 0.1     # ← was 0.3, update more frequently
    map_update_interval: 0.3

    # ================= SCAN MATCHING =================
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.2      # ← was 0.5, faster updates
    transform_timeout: 0.5          # ← was 0.2, more tolerant
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # ================= LOOP CLOSURE =================
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_covariance: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # ================= CORRELATION =================
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # ================= LOOP CLOSURE CORRELATION =================
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ================= SCAN MATCHER =================
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true